name: Supabase Keep Alive

on:
  schedule:
    # GitHub Actions cron uses UTC. Avoid minute 0 because it is more congested.
    - cron: "17 */12 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: true

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check project status
        id: project_status
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "needs_restore=false" >> "$GITHUB_OUTPUT"
            echo "Management API secrets not configured. Skipping restore check."
            exit 0
          fi

          RESPONSE=$(curl --silent --show-error --fail \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF")

          STATUS=$(echo "$RESPONSE" | jq -r '.status // ""')
          echo "Current project status: $STATUS"

          if echo "$STATUS" | grep -q "INACTIVE"; then
            echo "needs_restore=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_restore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore paused project
        if: steps.project_status.outputs.needs_restore == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          curl --silent --show-error --fail-with-body \
            -X POST \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/restore" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}'

          echo "Restore requested. Waiting for services to come back up..."
          sleep 60

      - name: Ping Supabase public API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL or SUPABASE_ANON_KEY is missing."
            exit 1
          fi

          curl --silent --show-error --fail-with-body \
            --retry 5 \
            --retry-delay 15 \
            --retry-all-errors \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/settings"
